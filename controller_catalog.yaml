# RB-Controller_fix — controller image catalog.
#
# Maps USB VID:PID identifiers to Wikimedia Commons file names. The sync
# tool (controller_sync.py) re-downloads each file from Commons and caches
# it locally at gui/img/known/<vid>_<pid>.jpg|png so the GUI can render
# without an internet round-trip.
#
# Scope: PC-compatible controllers only (native XInput / clean Windows HID).
# Controllers that require driver hacks to work on PC (e.g. DualShock 3 via
# SCP/MotioninJoy) are intentionally excluded — they don't deliver a
# "plug-and-play" RetroBat experience.
#
# To add a new controller:
#   1. Browse https://commons.wikimedia.org and find an image of the device
#   2. Copy the filename (without the leading "File:")
#   3. Add an entry below with the VID:PID (uppercase, no separators)
#   4. Run `py controller_sync.py` to fetch it
#
# Field reference:
#   vid          — 4-char hex USB Vendor ID (uppercase)
#   pid          — 4-char hex USB Product ID (uppercase)
#   name         — friendly display name in the GUI
#   wiki_file    — Wikimedia Commons file name (no "File:" prefix); blank
#                  to skip image sync (schematic fallback in GUI)
#   notes        — optional free text
#   pc_support   — "native" | "shim" — informational; entries listed here
#                  all work on Windows out of the box or with mainstream
#                  shims (DS4Windows / Steam Input)

schema: 1

controllers:
