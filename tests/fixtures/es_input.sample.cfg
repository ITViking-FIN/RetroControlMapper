<?xml version="1.0"?>
<!--
    es_input.sample.cfg — fixture for guid_aliases tests.

    Represents a minimal but realistic es_input.cfg with three
    <inputConfig type="joystick"> blocks:

      1. 8BitDo Ultimate over USB    (deviceGUID 03000000c82d00000631000011010000)
         VID:PID = 2dc8:3106
      2. 8BitDo Ultimate over BT     (deviceGUID 05000000c82d00000631000017010000)
         VID:PID = 2dc8:3106  ← same VID:PID as (1) → forms an alias group of 2
      3. Xbox 360 Controller (XInput) (deviceGUID 030000005e0400008e02000014010000)
         VID:PID = 045e:028e  ← singleton

    The two 2dc8:3106 entries should fold into a single alias group,
    while the 045e:028e entry remains a singleton.

    SDL GUID byte layout (little-endian) for VID/PID extraction:
      bytes 4-5 (chars  8-11) = VID  ("c8 2d" → 0x2dc8)
      bytes 8-9 (chars 16-19) = PID  ("06 31" → 0x3106)
-->
<inputList>
  <inputAction type="onfinish">
    <command>echo placeholder</command>
  </inputAction>
  <inputConfig type="joystick" deviceName="8BitDo Ultimate" deviceGUID="03000000c82d00000631000011010000">
    <input name="up"     type="hat"    id="0" value="1" />
    <input name="down"   type="hat"    id="0" value="4" />
    <input name="left"   type="hat"    id="0" value="8" />
    <input name="right"  type="hat"    id="0" value="2" />
    <input name="a"      type="button" id="0" value="1" />
    <input name="b"      type="button" id="1" value="1" />
    <input name="x"      type="button" id="2" value="1" />
    <input name="y"      type="button" id="3" value="1" />
    <input name="start"  type="button" id="7" value="1" />
    <input name="select" type="button" id="6" value="1" />
  </inputConfig>
  <inputConfig type="joystick" deviceName="8BitDo Ultimate (BT)" deviceGUID="05000000c82d00000631000017010000">
    <input name="up"     type="hat"    id="0" value="1" />
    <input name="down"   type="hat"    id="0" value="4" />
    <input name="left"   type="hat"    id="0" value="8" />
    <input name="right"  type="hat"    id="0" value="2" />
    <input name="a"      type="button" id="0" value="1" />
    <input name="b"      type="button" id="1" value="1" />
    <input name="x"      type="button" id="2" value="1" />
    <input name="y"      type="button" id="3" value="1" />
    <input name="start"  type="button" id="7" value="1" />
    <input name="select" type="button" id="6" value="1" />
  </inputConfig>
  <inputConfig type="joystick" deviceName="Xbox 360 Controller (XInput STANDARD GAMEPAD)" deviceGUID="030000005e0400008e02000014010000">
    <input name="up"     type="hat"    id="0" value="1" />
    <input name="down"   type="hat"    id="0" value="4" />
    <input name="left"   type="hat"    id="0" value="8" />
    <input name="right"  type="hat"    id="0" value="2" />
    <input name="a"      type="button" id="0" value="1" />
    <input name="b"      type="button" id="1" value="1" />
    <input name="x"      type="button" id="2" value="1" />
    <input name="y"      type="button" id="3" value="1" />
    <input name="start"  type="button" id="7" value="1" />
    <input name="select" type="button" id="6" value="1" />
  </inputConfig>
</inputList>
