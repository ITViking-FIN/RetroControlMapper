notes: 'An old .keys file shipped with this ROM mapped L2→J and R2→N.

  Those are likely Spy Hunter''s weapon-fire keys. pad2key is inert

  for libretro VICE — these can only be expressed via vice_mapper_l2

  / vice_mapper_r2 globally, but those are currently RETROK_ESCAPE

  and RETROK_RETURN (used by other games). Per-game free remap not

  yet possible without additional plumbing.

  Action: profile is documentation-only for now.'
