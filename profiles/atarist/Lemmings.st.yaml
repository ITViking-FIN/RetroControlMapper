notes: |
  DMA Design's puzzle classic. MOUSE-DRIVEN — the bottom toolbar is point-and-
  click for assigning skills; joystick play is essentially impossible.

  Same control template as Dungeon Master: analog stick → mouse, B/A → mouse
  buttons. Speed-up / slow-down keys (F1-F3 area) reach via keyboard
  pass-through.
